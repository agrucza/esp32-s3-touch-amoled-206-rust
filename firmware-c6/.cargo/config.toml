[build]
target = "riscv32imac-unknown-none-elf"

[target.riscv32imac-unknown-none-elf]
# `--partition-table` writes our custom layout to 0x8000 on every flash.
# The CSV reserves a `storage` partition for future LittleFS use; the
# smoke test doesn't read or write it, but having the layout pinned now
# means later persistence work can land without a re-flash that would
# wipe stored data.
runner = "espflash flash --monitor --partition-table partitions-c6.csv"
rustflags = [
    # Pull in esp-hal's linker script, which sets up all memory sections.
    "-C", "link-arg=-Tlinkall.x",
]

# No `[unstable] build-std` block here: precompiled `core` and `alloc`
# ship with the stable toolchain for `riscv32imac-unknown-none-elf`,
# unlike the Xtensa targets which require build-std on the esp fork.
